name: CI — Validação de Qualidade

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  # Antecipa a migração GitHub Actions Node.js 20 → 24 (deadline 2026-09-16)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Type check — shared
        run: cd packages/shared && npx tsc --noEmit

      - name: Type check — auth
        run: cd services/auth && npx tsc --noEmit

      - name: Type check — financeiro
        run: cd services/financeiro && npx tsc --noEmit

      - name: Type check — clientes
        run: cd services/clientes && npx tsc --noEmit

      - name: Type check — stock
        run: cd services/stock && npx tsc --noEmit

      - name: Type check — faturacao
        run: cd services/faturacao && npx tsc --noEmit

      - name: Type check — dashboard
        run: cd services/dashboard && npx tsc --noEmit

      - name: Type check — subscriptions
        run: cd services/subscriptions && npx tsc --noEmit

      - name: Type check — notificacoes
        run: cd services/notificacoes && npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint --workspaces --if-present

  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm run test --workspaces --if-present
        env:
          NODE_ENV: test
