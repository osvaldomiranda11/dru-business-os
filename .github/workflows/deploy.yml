name: Deploy — Produção

on:
  push:
    branches: [main]

env:
  # Antecipa a migração GitHub Actions Node.js 20 → 24 (deadline 2026-09-16)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy-infra:
    name: Deploy Infraestrutura
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Deploy — Infraestrutura partilhada
        run: cd infra && npx serverless deploy --stage prod --verbose

  deploy-auth:
    name: Deploy Serviço Auth
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Deploy — Auth
        run: cd services/auth && npx serverless deploy --stage prod --verbose

  deploy-financeiro:
    name: Deploy Serviço Financeiro
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Deploy — Financeiro
        run: cd services/financeiro && npx serverless deploy --stage prod --verbose

  deploy-clientes:
    name: Deploy Serviço Clientes
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Deploy — Clientes
        run: cd services/clientes && npx serverless deploy --stage prod --verbose

  deploy-stock:
    name: Deploy Serviço Stock
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Deploy — Stock
        run: cd services/stock && npx serverless deploy --stage prod --verbose

  deploy-faturacao:
    name: Deploy Serviço Faturação
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Deploy — Faturação
        run: cd services/faturacao && npx serverless deploy --stage prod --verbose

  deploy-dashboard:
    name: Deploy Serviço Dashboard
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Deploy — Dashboard
        run: cd services/dashboard && npx serverless deploy --stage prod --verbose

  deploy-subscriptions:
    name: Deploy Serviço Subscriptions
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Deploy — Subscriptions
        run: cd services/subscriptions && npx serverless deploy --stage prod --verbose

  deploy-notificacoes:
    name: Deploy Serviço Notificações
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Deploy — Notificações
        run: cd services/notificacoes && npx serverless deploy --stage prod --verbose

  notify:
    name: Notificação de Deploy
    runs-on: ubuntu-latest
    needs: [deploy-auth, deploy-financeiro, deploy-clientes, deploy-stock, deploy-faturacao, deploy-dashboard, deploy-subscriptions, deploy-notificacoes]
    if: always()
    steps:
      - name: Resultado do deploy
        run: |
          if [ "${{ needs.deploy-auth.result }}" == "success" ] && \
             [ "${{ needs.deploy-financeiro.result }}" == "success" ] && \
             [ "${{ needs.deploy-clientes.result }}" == "success" ] && \
             [ "${{ needs.deploy-stock.result }}" == "success" ] && \
             [ "${{ needs.deploy-faturacao.result }}" == "success" ] && \
             [ "${{ needs.deploy-dashboard.result }}" == "success" ] && \
             [ "${{ needs.deploy-subscriptions.result }}" == "success" ] && \
             [ "${{ needs.deploy-notificacoes.result }}" == "success" ]; then
            echo "✅ Deploy de produção concluído com sucesso"
          else
            echo "❌ Deploy de produção falhou"
            exit 1
          fi
