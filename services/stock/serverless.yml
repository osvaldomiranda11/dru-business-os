service: dru-bos-stock

frameworkVersion: '3'

plugins:
  - serverless-esbuild

provider:
  name: aws
  region: af-south-1
  stage: ${opt:stage, 'dev'}
  runtime: nodejs20.x
  architecture: arm64
  memorySize: 256
  timeout: 29
  logRetentionInDays: 30
  tags:
    Produto: dru-business-os
    Servico: stock
    Ambiente: ${sls:stage}
  environment:
    NODE_ENV: ${sls:stage}
    SERVICE_NAME: dru-bos-stock
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
    COGNITO_USER_POOL_ID: ${cf:dru-bos-infra-${sls:stage}.CognitoUserPoolId}
    COGNITO_CLIENT_ID: ${cf:dru-bos-infra-${sls:stage}.CognitoUserPoolClientId}
    STOCK_TABLE: ${cf:dru-bos-infra-${sls:stage}.StockTableName}
    AUDITORIA_TABLE: ${cf:dru-bos-infra-${sls:stage}.AuditoriaTableName}
    EVENT_BUS_NAME: ${cf:dru-bos-infra-${sls:stage}.EventBusName}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Query
          Resource:
            - arn:aws:dynamodb:af-south-1:*:table/${cf:dru-bos-infra-${sls:stage}.StockTableName}
            - arn:aws:dynamodb:af-south-1:*:table/${cf:dru-bos-infra-${sls:stage}.StockTableName}/index/*
            - arn:aws:dynamodb:af-south-1:*:table/${cf:dru-bos-infra-${sls:stage}.AuditoriaTableName}
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource: ${cf:dru-bos-infra-${sls:stage}.EventBusArn}

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    concurrency: 4
    packager: npm

functions:
  criarProduto:
    handler: src/handlers/produtos.criar
    description: Regista um novo produto no catálogo
    events:
      - http:
          path: /stock/produtos
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${cf:dru-bos-infra-${sls:stage}.CognitoUserPoolArn}

  listarProdutos:
    handler: src/handlers/produtos.listar
    description: Lista produtos com filtros e alertas de stock mínimo
    events:
      - http:
          path: /stock/produtos
          method: GET
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${cf:dru-bos-infra-${sls:stage}.CognitoUserPoolArn}

  actualizarProduto:
    handler: src/handlers/produtos.actualizar
    description: Actualiza dados de um produto
    events:
      - http:
          path: /stock/produtos/{id}
          method: PUT
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${cf:dru-bos-infra-${sls:stage}.CognitoUserPoolArn}

  registarMovimento:
    handler: src/handlers/movimentos.registar
    description: Regista entrada ou saída de stock
    events:
      - http:
          path: /stock/movimentos
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${cf:dru-bos-infra-${sls:stage}.CognitoUserPoolArn}

  listarMovimentos:
    handler: src/handlers/movimentos.listar
    description: Lista movimentos de stock por produto ou período
    events:
      - http:
          path: /stock/movimentos
          method: GET
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${cf:dru-bos-infra-${sls:stage}.CognitoUserPoolArn}

  relatorioStock:
    handler: src/handlers/relatorios.valoriacaoInventario
    description: Relatório de valorização de inventário
    memorySize: 512
    events:
      - http:
          path: /stock/relatorios/valorizacao
          method: GET
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${cf:dru-bos-infra-${sls:stage}.CognitoUserPoolArn}

  alertasStockMinimo:
    handler: src/handlers/alertas.verificarStockMinimo
    description: Verifica produtos abaixo do stock mínimo (EventBridge scheduled)
    events:
      - eventBridge:
          eventBus: ${cf:dru-bos-infra-${sls:stage}.EventBusName}
          pattern:
            source:
              - dru-bos.stock
            detail-type:
              - VerificarStockMinimo
